meters:
- name: database_credits
  description: Monthly database credits consumed - 1 per vessel or port result, 1 per vessel-day of history, capped at 500 per radius query.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: api_calls
  description: API requests per minute against the shared 600 calls/minute cap; also useful for detecting wasteful polling.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: report_jobs
  description: Asynchronous report submissions (1 credit each) plus fixed-price datasets like a full vessel list (5,000 credits) or port list (500 credits).
  unit: jobs
  aggregation: sum
  dimensions:
  - account
- name: subscription_fee
  description: Flat monthly or annual subscription fee for the selected tier and add-ons.
  unit: EUR
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Poll the free /stat endpoint to track monthly credit consumption against the plan allowance and alert before exhaustion.
- name: Allocation
  description: Attribute credit consumption to workloads by endpoint - live polling, radius zones, history pulls, and reports have very different credit profiles.
- name: Optimization
  description: Filter radius queries by vessel type and navigational status to cut per-call vessel counts, size history windows precisely (each vessel-day costs a credit), batch live lookups through /vessel_bulk, and move to Developer Pro+ only when credit spend at lower tiers exceeds the flat unlimited price.
- name: Accountability
  description: Review tier fit monthly - unused credits reset and do not roll over, and annual billing saves 10% once usage is predictable.
