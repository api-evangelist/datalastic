description: >-
  FinOps view of Datalastic spend. Cost is a flat monthly (or annual, 10%
  discounted) EUR subscription that bundles a database-credit allowance -
  Starter EUR 199/month for 20,000 credits, Experimenter EUR 569/month for
  80,000, Developer Pro+ EUR 679/month unlimited, with "+ Add-Ons" tiers at
  EUR 599/849/949 adding specialty datasets. The variable dimension is credit
  consumption, deducted per result returned - 1 per vessel or port, 1 per
  vessel per day of history, up to 500 per radius query - so query design
  (filters, radius size, history windows) directly drives how far a plan's
  allowance goes. Failed requests are free, unused credits reset monthly, and
  the /stat endpoint provides free consumption telemetry.
notes: >-
  Prices captured 2026-07-11 in EUR; verify on the pricing page during
  reconciliation. The main cost decisions are tier selection (credit
  allowance vs unlimited), whether add-on datasets are needed, and annual vs
  monthly billing.
