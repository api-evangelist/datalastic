specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Datalastic
providerId: datalastic
created: '2026-07-11'
modified: '2026-07-11'
reconciled: false
tags:
- Vessel Tracking
- Maritime
- AIS
- Ships
- Plans
description: >-
  Datalastic is subscription-only with no free tier. Plans are metered in
  monthly database credits - a credit is deducted per result returned (per
  vessel, per port, per vessel-day of history), not per request, and failed
  requests are not charged. Three core tiers (Starter, Experimenter, Developer
  Pro+) cover the standard endpoints (live tracking, zone traffic, history,
  vessel/port finder, ship specs, port terminals); matching "+ Add-Ons" tiers
  add specialty datasets (maritime companies, vessel ownership, inspections
  and detentions, dry dock dates, demolitions, casualties, engine data,
  classification societies, route tracking, SAT-E tracking). Every tier starts
  with a 14-day paid trial, annual billing is 10% off, unused credits reset
  monthly, and all plans share a 600 calls/minute rate limit with a 2-week
  money-back guarantee.
notes: >-
  Prices captured 2026-07-11 from datalastic.com/pricing in EUR. Verify
  current rates during reconciliation; trial prices (EUR 9/19/45 and
  10/20/46 for Add-Ons tiers) cover the first 14 days.
sources:
- https://datalastic.com/pricing/
- https://datalastic.com/api-reference/
